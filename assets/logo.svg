<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .logo-text { fill: #e6edf3; }
        .node-stroke { stroke: #58a6ff; fill: none; }
        .node-fill { fill: #58a6ff; }
        .arrow { stroke: #58a6ff; fill: #58a6ff; }
      }
      @media (prefers-color-scheme: light) {
        .logo-text { fill: #24292f; }
        .node-stroke { stroke: #0969da; fill: none; }
        .node-fill { fill: #0969da; }
        .arrow { stroke: #0969da; fill: #0969da; }
      }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path class="arrow" d="M0,0 L8,3 L0,6 Z" stroke="none"/>
    </marker>
  </defs>
  <!-- State nodes -->
  <circle class="node-stroke" cx="20" cy="50" r="9" stroke-width="2" opacity="0.4"/>
  <circle class="node-fill" cx="20" cy="50" r="3" opacity="0.4"/>
  <circle class="node-stroke" cx="58" cy="50" r="9" stroke-width="2" opacity="0.7"/>
  <circle class="node-fill" cx="58" cy="50" r="3" opacity="0.7"/>
  <circle class="node-stroke" cx="96" cy="50" r="9" stroke-width="2"/>
  <circle class="node-fill" cx="96" cy="50" r="3"/>
  <!-- Arrows between nodes -->
  <line class="arrow" x1="30" y1="50" x2="48" y2="50" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" opacity="0.5"/>
  <line class="arrow" x1="68" y1="50" x2="86" y2="50" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" opacity="0.8"/>
  <!-- Logo text -->
  <text class="logo-text" x="120" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="bold" letter-spacing="6">finita</text>
</svg>
